<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Brp Digital Election</title>
    <link rel="icon" type="image/png" href="Brp Digital Institute logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 30%, #0b2b44, #05141f); min-height: 100vh; padding: 30px 20px; color: white; }
        .container { max-width: 1400px; margin: 0 auto; }
        .school-header { background: linear-gradient(135deg, #1e4b6e, #0a2a3b); border-radius: 45px; padding: 28px 30px; text-align: center; margin-bottom: 35px; }
        .school-name { font-size: 2.3rem; font-weight: 800; background: linear-gradient(135deg, #fff, #ffd966); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .motto { margin-top: 12px; font-size: 1.2rem; opacity: 0.9; }
        .tabs { display: flex; justify-content: center; gap: 18px; margin-bottom: 35px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border: none; padding: 14px 34px; border-radius: 60px; font-weight: 700; color: white; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, #f39c12, #e67e22); box-shadow: 0 8px 20px rgba(243,156,18,0.4); }
        .panel { display: none; animation: fadeIn 0.3s ease; }
        .panel.active-panel { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
        .card { background: rgba(255,255,255,0.06); backdrop-filter: blur(18px); border-radius: 45px; padding: 35px; border: 1px solid rgba(255,255,255,0.12); }
        .step-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; border-left: 6px solid #f39c12; padding-left: 20px; }
        .candidates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 28px; margin: 30px 0; }
        .candidate-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 32px; text-align: center; padding: 22px 15px; cursor: pointer; transition: all 0.25s; }
        .candidate-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.12); }
        .candidate-card.selected { background: linear-gradient(145deg, #f39c12, #d35400); border-color: #ffd966; }
        .candidate-symbol { font-size: 3rem; margin-bottom: 8px; display: block; }
        .candidate-img { width: 85px; height: 85px; object-fit: cover; border-radius: 50%; margin: 0 auto 10px; border: 2px solid gold; background: white; }
        .candidate-name { font-size: 1rem; font-weight: 700; word-break: break-word; }
        .checkbox-card { background: rgba(255,255,255,0.05); border-radius: 28px; padding: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; margin-bottom: 12px; }
        .checkbox-card:hover { background: rgba(255,255,255,0.12); }
        .checkbox-card input { width: 22px; height: 22px; accent-color: #f39c12; }
        .btn { background: linear-gradient(135deg, #2c7da0, #1f5068); border: none; padding: 12px 28px; border-radius: 60px; font-weight: 700; color: white; cursor: pointer; transition: 0.2s; margin-right: 12px; margin-top: 15px; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-success { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-secondary { background: rgba(255,255,255,0.2); }
        .btn-sm { padding: 6px 16px; font-size: 0.8rem; margin-top: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 28px; text-align: center; }
        .result-block { background: rgba(0,0,0,0.25); border-radius: 30px; padding: 20px; margin-bottom: 25px; }
        .candidate-result { margin-bottom: 16px; }
        .result-bar-container { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .result-bar-wrapper { flex: 1; height: 30px; background: rgba(0,0,0,0.4); border-radius: 30px; overflow: hidden; }
        .result-bar { height: 100%; border-radius: 30px; transition: width 0.4s ease; }
        .bar-green { background: linear-gradient(90deg, #2ecc71, #27ae60); }
        .bar-red { background: linear-gradient(90deg, #e74c3c, #c0392b); }
        .winner-badge { background: gold; color: #1e2a3a; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 800; margin-left: 12px; }
        .leading-badge { background: #3498db; color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 800; margin-left: 12px; }
        .admin-candidate-row { background: rgba(255,255,255,0.08); border-radius: 28px; padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .upload-btn { background: rgba(243,156,18,0.2); border: 2px dashed #f39c12; border-radius: 30px; padding: 6px 16px; cursor: pointer; transition: 0.2s; font-size: 0.75rem; text-align: center; color: #ffd966; }
        .upload-btn:hover { background: rgba(243,156,18,0.5); }
        .preview-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: white; }
        .inline-form { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 12px; }
        .post-card { background: rgba(0,0,0,0.2); border-radius: 32px; padding: 18px; margin-bottom: 25px; border-left: 4px solid #f39c12; }
        input, select { padding: 10px 16px; border-radius: 40px; border: none; font-size: 0.9rem; background: #fff; color: #000; }
        .thanks-message { background: linear-gradient(135deg, #27ae60, #2ecc71); padding: 14px 20px; border-radius: 50px; margin-top: 20px; text-align: center; font-weight: 700; }
        hr { margin: 20px 0; border-color: rgba(255,255,255,0.1); }
        @media (max-width: 700px) { .candidates-grid { grid-template-columns: 1fr; } .inline-form input { width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <div class="school-header">
        <div class="school-name">🏛️ LOVELY ANGELS ENGLISH BOARDING SCHOOL 🏛️</div>
        <div class="motto">⚡Students' Election 2083 | Click to Upload Image | Live Results⚡</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" data-tab="voter">🗳️Voting Panel</button>
        <button class="tab-btn" data-tab="admin">📊Admin Panel</button>
    </div>

    <div id="voterPanel" class="panel active-panel"><div class="card"><div id="voterContentArea"></div><div id="voterFeedback"></div></div></div>
    <div id="adminPanel" class="panel">
        <div class="card">
            <h2>Election Management</h2>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="totalVotersDisplay">0</div><div>कुल मतदाता</div></div>
                <div class="stat-card"><div class="stat-number" id="votersDoneDisplay">0</div><div>मतदान गरेको</div></div>
                <div class="stat-card"><div class="stat-number" id="remainingDisplay">0</div><div>बाँकी</div></div>
            </div>

            <div style="margin-bottom: 25px; display: flex; flex-wrap: wrap; gap: 12px;">
                <input type="number" id="setVotersInput" placeholder="Total Voters" value="5">
                <button id="startElectionBtn" class="btn btn-primary">🚀 Start Election</button>
                <button id="resetSystemBtn" class="btn btn-danger">🔄 Reset Data</button>
            </div>

            <hr>
            <div id="dynamicAdminCandidates"></div>
            <hr>
            <h2>📊लाइभ नतिजा (Green = अग्रस्थान / विजेता)</h2>
            <div id="adminResultsContainer"></div>
        </div>
    </div>
</div>

<script>
    // ---------- FIXED POSTS (सबै पुराना पदहरू) ----------
    const houses = [
        { code: "red", name: "🔴 Red House", symbol: "🔴" },
        { code: "blue", name: "🔵 Blue House", symbol: "🔵" },
        { code: "green", name: "🟢 Green House", symbol: "🟢" },
        { code: "yellow", name: "🟡 Yellow House", symbol: "🟡" }
    ];
    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 10); }

    // Default candidates (editable)
    let schoolCaptainCandidates = [
        { id: genId(), name: "AMARJIT GAHATRAJ", symbol: "🦁", image: "" },
        { id: genId(), name: "LOVESON BK", symbol: "🦚", image: "" }
    ];
    let viceCaptainCandidates = [
        { id: genId(), name: "Ramesh Ghimire", symbol: "⚡", image: "" },
        { id: genId(), name: "Anita Basnet", symbol: "🍃", image: "" }
    ];
    let houseCaptainsData = {
        red:   [{ id: genId(), name: "Red House Captain - Ram Thapa", symbol: "🦁", image: "" }, { id: genId(), name: "Red House Captain - Sita Sharma", symbol: "🌺", image: "" }],
        blue:  [{ id: genId(), name: "Blue House Captain - Hari Bista", symbol: "⚡", image: "" }, { id: genId(), name: "Blue House Captain - Gita Karki", symbol: "🌸", image: "" }],
        green: [{ id: genId(), name: "Green House Captain - Bishal Rai", symbol: "🌿", image: "" }, { id: genId(), name: "Green House Captain - Rina Magar", symbol: "🍃", image: "" }],
        yellow: [{ id: genId(), name: "Yellow House Captain - Krishna Pun", symbol: "☀️", image: "" }, { id: genId(), name: "Yellow House Captain - Anju Basnet", symbol: "🌟", image: "" }]
    };
    let childClubSingles = [
        { title: "👑 Child Club President", candidates: [{ id: genId(), name: "Suman Adhikari", symbol: "👑", image: "" }, { id: genId(), name: "Rita K.C.", symbol: "🌸", image: "" }] },
        { title: "🎤 Child Club Vice President", candidates: [{ id: genId(), name: "Bikram Thapa", symbol: "🎤", image: "" }, { id: genId(), name: "Nisha Gurung", symbol: "🕊️", image: "" }] },
        { title: "📝 Child Club Secretary", candidates: [{ id: genId(), name: "Alina Shrestha", symbol: "📚", image: "" }, { id: genId(), name: "Prabin Rai", symbol: "⚙️", image: "" }] },
        { title: "💰 Child Club Treasurer", candidates: [{ id: genId(), name: "Sachin KC", symbol: "💰", image: "" }, { id: genId(), name: "Monika Tamang", symbol: "💵", image: "" }] }
    ];
    let childClubMembers = [
        { id: genId(), name: "Anish Lama", symbol: "🤝", image: "" }, { id: genId(), name: "Kamana Ghimire", symbol: "🐇", image: "" },
        { id: genId(), name: "Rabin Poudel", symbol: "🏅", image: "" }, { id: genId(), name: "Sneha KC", symbol: "📷", image: "" },
        { id: genId(), name: "Ujwal Magar", symbol: "🧠", image: "" }, { id: genId(), name: "Karuna Thapa", symbol: "🌿", image: "" },
        { id: genId(), name: "Saugat Bhatta", symbol: "🚗", image: "" }, { id: genId(), name: "Sahira Basnet", symbol: "🐘", image: "" },
        { id: genId(), name: "Manisha Rijal", symbol: "🪑", image: "" }
    ];

    // Voting state
    let totalVoters = 0, votersDone = 0;
    let currentStep = 0;
    let currentHouseSelection = null;
    let currentStepVoted = false;
    let selectedCandidateId = null;
    let selectedMultiIds = [];
    let votes = [];

    function rebuildVotes() {
        votes = [];
        let m0 = {}; schoolCaptainCandidates.forEach(c => m0[c.id] = 0); votes.push(m0);
        let m1 = {}; viceCaptainCandidates.forEach(c => m1[c.id] = 0); votes.push(m1);
        let m2 = {}; for(let h of houses) houseCaptainsData[h.code].forEach(c => m2[c.id] = 0); votes.push(m2);
        for(let i=0;i<childClubSingles.length;i++) { let m = {}; childClubSingles[i].candidates.forEach(c => m[c.id] = 0); votes.push(m); }
        let m7 = {}; childClubMembers.forEach(c => m7[c.id] = 0); votes.push(m7);
    }

    function saveToLocalStorage() {
        const data = { schoolCaptainCandidates, viceCaptainCandidates, houseCaptainsData, childClubSingles, childClubMembers,
            totalVoters, votersDone, currentStep, currentHouseSelection, currentStepVoted, selectedCandidateId, selectedMultiIds, votes };
        localStorage.setItem('fullElectionDynamic', JSON.stringify(data));
    }
    function loadFromLocalStorage() {
        const raw = localStorage.getItem('fullElectionDynamic');
        if(raw) {
            try {
                const d = JSON.parse(raw);
                schoolCaptainCandidates = d.schoolCaptainCandidates;
                viceCaptainCandidates = d.viceCaptainCandidates;
                houseCaptainsData = d.houseCaptainsData;
                childClubSingles = d.childClubSingles;
                childClubMembers = d.childClubMembers;
                totalVoters = d.totalVoters;
                votersDone = d.votersDone;
                currentStep = d.currentStep;
                currentHouseSelection = d.currentHouseSelection;
                currentStepVoted = d.currentStepVoted;
                selectedCandidateId = d.selectedCandidateId;
                selectedMultiIds = d.selectedMultiIds || [];
                votes = d.votes;
                if(!votes || votes.length !== 8) rebuildVotes();
                return;
            } catch(e) {}
        }
        rebuildVotes();
        saveToLocalStorage();
    }

    function resetElectionProgress(keepVotersCount = false) {
        if(!keepVotersCount) totalVoters = 0;
        votersDone = 0;
        currentStep = 0;
        currentHouseSelection = null;
        currentStepVoted = false;
        selectedCandidateId = null;
        selectedMultiIds = [];
        rebuildVotes();
        saveToLocalStorage();
        renderVoterUI();
        renderAdminPanel();
    }
    function fullReset() { if(confirm("All data will be deleted. Continue?")) resetElectionProgress(false); }
    function startElection() {
        let newTotal = parseInt(document.getElementById('setVotersInput').value);
        if(isNaN(newTotal) || newTotal < 1) { alert("Total voters must be at least 1"); return; }
        if(votersDone > 0 && !confirm("Voting progress will reset. Continue?")) return;
        totalVoters = newTotal;
        votersDone = 0;
        currentStep = 0;
        currentHouseSelection = null;
        currentStepVoted = false;
        selectedCandidateId = null;
        selectedMultiIds = [];
        rebuildVotes();
        saveToLocalStorage();
        renderVoterUI();
        renderAdminPanel();
        document.querySelector('.tab-btn[data-tab="voter"]').click();
    }

    function getCurrentStepData() {
        if(currentStep === 0) return { type: 'single', title: "🏆 School Captain", candidates: schoolCaptainCandidates };
        if(currentStep === 1) return { type: 'single', title: "🎽 Vice Captain", candidates: viceCaptainCandidates };
        if(currentStep === 2) return { type: 'house', title: "🏠 House Captain" };
        if(currentStep >=3 && currentStep <=6) return { type: 'single', title: childClubSingles[currentStep-3].title, candidates: childClubSingles[currentStep-3].candidates };
        if(currentStep === 7) return { type: 'multi', title: "👥 Child Club Members (Select exactly 4)", candidates: childClubMembers, exact: 4 };
        return null;
    }

    function submitVote() {
        if(currentStepVoted) return;
        const step = getCurrentStepData();
        if(!step) return;
        if(step.type === 'single') {
            if(!selectedCandidateId) { alert("Please select a candidate"); return; }
            votes[currentStep][selectedCandidateId] += 1;
            currentStepVoted = true;
            saveToLocalStorage();
            renderVoterUI();
        } 
        else if(step.type === 'house') {
            if(!selectedCandidateId) { alert("Please select a candidate"); return; }
            votes[2][selectedCandidateId] += 1;
            currentStepVoted = true;
            saveToLocalStorage();
            renderVoterUI();
        }
        else if(step.type === 'multi') {
            if(selectedMultiIds.length !== step.exact) { alert(`Please select exactly ${step.exact} candidates`); return; }
            for(let cid of selectedMultiIds) votes[currentStep][cid] += 1;
            currentStepVoted = true;
            saveToLocalStorage();
            renderVoterUI();
        }
        renderAdminPanel();
    }

    function nextStep() {
        if(!currentStepVoted && getCurrentStepData()) { alert("Submit your vote first"); return; }
        if(currentStep === 2 && currentHouseSelection === null) { alert("Choose your house first"); return; }
        if(currentStep + 1 < 8) {
            currentStep++;
            currentStepVoted = false;
            selectedCandidateId = null;
            selectedMultiIds = [];
            if(currentStep === 2) currentHouseSelection = null;
            saveToLocalStorage();
            renderVoterUI();
            document.getElementById('voterFeedback').innerHTML = '';
        } else {
            votersDone++;
            if(votersDone <= totalVoters) {
                currentStep = 0;
                currentHouseSelection = null;
                currentStepVoted = false;
                selectedCandidateId = null;
                selectedMultiIds = [];
                saveToLocalStorage();
                renderVoterUI();
                const fb = document.getElementById('voterFeedback');
                if(votersDone < totalVoters) {
                    fb.innerHTML = `<div class="thanks-message">✅ Voter ${votersDone} finished. Next voter (${votersDone+1}) can start.</div>`;
                    setTimeout(() => { if(fb.innerHTML.includes("Next voter")) fb.innerHTML = ''; }, 4000);
                } else {
                    fb.innerHTML = `<div class="thanks-message">🎉 Election Completed! All voters have cast their votes. 🎉</div>`;
                }
                renderAdminPanel();
            } else { renderVoterUI(); }
        }
        renderAdminPanel();
    }

    function renderVoterUI() {
        const container = document.getElementById('voterContentArea');
        if(!container) return;
        if(totalVoters === 0) { container.innerHTML = `<div style="text-align:center; padding:40px;">⏳ Set total voters in Admin panel and start election.</div>`; return; }
        if(votersDone >= totalVoters) { container.innerHTML = `<div style="text-align:center;"><h2>🎉 Election Completed 🎉</h2><p>View results in Admin panel.</p></div>`; return; }
        const step = getCurrentStepData();
        if(!step) return;
        let html = `<div class="step-title">${step.title} (Voter: ${votersDone+1}/${totalVoters})</div>`;
        if(step.type === 'single') {
            html += `<div class="candidates-grid">`;
            step.candidates.forEach(cand => {
                const isSelected = (selectedCandidateId === cand.id);
                const imgHtml = cand.image ? `<img src="${cand.image}" class="candidate-img" onerror="this.style.display='none'">` : `<div class="candidate-symbol">${cand.symbol}</div>`;
                html += `<div class="candidate-card ${isSelected ? 'selected' : ''}" data-cand-id="${cand.id}">${imgHtml}<div class="candidate-name">${cand.name}</div></div>`;
            });
            html += `</div>`;
        } else if(step.type === 'house') {
            if(currentHouseSelection === null) {
                html += `<div class="candidates-grid">`;
                houses.forEach(house => {
                    html += `<div class="candidate-card" data-house="${house.code}"><div class="candidate-symbol">${house.symbol}</div><div class="candidate-name">${house.name}</div></div>`;
                });
                html += `</div>`;
            } else {
                const candidates = houseCaptainsData[currentHouseSelection];
                html += `<div class="step-title">${houses.find(h=>h.code===currentHouseSelection).name} Candidates</div>`;
                html += `<div class="candidates-grid">`;
                candidates.forEach(cand => {
                    const isSelected = (selectedCandidateId === cand.id);
                    const imgHtml = cand.image ? `<img src="${cand.image}" class="candidate-img">` : `<div class="candidate-symbol">${cand.symbol}</div>`;
                    html += `<div class="candidate-card ${isSelected ? 'selected' : ''}" data-cand-id="${cand.id}">${imgHtml}<div class="candidate-name">${cand.name}</div></div>`;
                });
                html += `</div><button id="backHouseBtn" class="btn btn-secondary">⬅️ Back to Houses</button>`;
            }
        } else if(step.type === 'multi') {
            html += `<div class="candidates-grid" style="grid-template-columns: 1fr;">`;
            step.candidates.forEach(cand => {
                const checked = selectedMultiIds.includes(cand.id);
                const imgHtml = cand.image ? `<img src="${cand.image}" style="width:40px; height:40px; border-radius:50%;">` : `<div class="candidate-symbol" style="font-size:2rem;">${cand.symbol}</div>`;
                html += `<label class="checkbox-card" data-cand-id="${cand.id}"><input type="checkbox" ${checked ? 'checked' : ''}> ${imgHtml}<div class="candidate-name">${cand.name}</div></label>`;
            });
            html += `</div>`;
        }
        if(!currentStepVoted) {
            if(step.type !== 'house' || currentHouseSelection !== null) html += `<button id="submitVoteBtn" class="btn btn-primary">🗳️ Submit Vote</button>`;
        } else {
            html += `<div class="thanks-message" style="margin-top:0;">✔️ Vote recorded. Go to next post.</div>`;
            html += `<button id="nextStepBtn" class="btn">➡️ Next Post</button>`;
        }
        container.innerHTML = html;

        if(!currentStepVoted) {
            if(step.type === 'single') {
                document.querySelectorAll('.candidate-card').forEach(card => {
                    card.addEventListener('click', () => { selectedCandidateId = card.getAttribute('data-cand-id'); document.querySelectorAll('.candidate-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); });
                });
                const sub = document.getElementById('submitVoteBtn'); if(sub) sub.onclick = submitVote;
            } else if(step.type === 'house') {
                if(currentHouseSelection === null) {
                    document.querySelectorAll('.candidate-card').forEach(card => {
                        card.addEventListener('click', (e) => { currentHouseSelection = card.getAttribute('data-house'); selectedCandidateId = null; renderVoterUI(); });
                    });
                } else {
                    document.querySelectorAll('.candidate-card').forEach(card => {
                        card.addEventListener('click', () => { selectedCandidateId = card.getAttribute('data-cand-id'); document.querySelectorAll('.candidate-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); });
                    });
                    const back = document.getElementById('backHouseBtn'); if(back) back.onclick = () => { currentHouseSelection = null; selectedCandidateId = null; renderVoterUI(); };
                    const sub = document.getElementById('submitVoteBtn'); if(sub) sub.onclick = submitVote;
                }
            } else if(step.type === 'multi') {
                const updateMulti = () => {
                    let newSel = [];
                    document.querySelectorAll('.checkbox-card input:checked').forEach(cb => { newSel.push(cb.closest('.checkbox-card').getAttribute('data-cand-id')); });
                    if(newSel.length > step.exact) { alert(`Select exactly ${step.exact} candidates.`); return false; }
                    selectedMultiIds = newSel; saveToLocalStorage(); renderVoterUI(); return true;
                };
                document.querySelectorAll('.checkbox-card').forEach(label => {
                    const inp = label.querySelector('input');
                    label.addEventListener('click', (e) => { if(e.target.tagName !== 'INPUT') { inp.checked = !inp.checked; updateMulti(); } });
                    inp.addEventListener('change', (e) => { e.stopPropagation(); updateMulti(); });
                });
                const sub = document.getElementById('submitVoteBtn'); if(sub) sub.onclick = submitVote;
            }
        } else {
            const next = document.getElementById('nextStepBtn'); if(next) next.onclick = nextStep;
        }
    }

    // Helper: update image for a candidate by ID
    function updateCandidateImage(candidateId, imageDataUrl) {
        let updated = false;
        const update = (arr) => { arr.forEach(c => { if(c.id === candidateId) { c.image = imageDataUrl; updated = true; } }); };
        update(schoolCaptainCandidates);
        update(viceCaptainCandidates);
        for(let h of houses) update(houseCaptainsData[h.code]);
        for(let s of childClubSingles) update(s.candidates);
        update(childClubMembers);
        return updated;
    }

    // Admin panel with click-to-upload (file picker)
    function renderAdminPanel() {
        document.getElementById('totalVotersDisplay').innerText = totalVoters;
        document.getElementById('votersDoneDisplay').innerText = votersDone;
        document.getElementById('remainingDisplay').innerText = totalVoters - votersDone;

        let adminHtml = `<h3>✏️ Manage Candidates (Click "Upload Image" to select file)</h3>`;
        function renderSection(title, candidates, houseCode=null) {
            let id = title.replace(/[^a-z0-9]/gi,'');
            let html = `<div class="post-card"><h4>${title}</h4>`;
            candidates.forEach((cand, idx) => {
                html += `<div class="admin-candidate-row" data-cand-id="${cand.id}">
                            ${cand.image ? `<img src="${cand.image}" class="preview-img">` : `<div class="candidate-symbol" style="font-size:1.8rem;">${cand.symbol}</div>`}
                            <div style="flex:1;"><strong>${cand.name}</strong> ${cand.symbol}</div>
                            <button class="upload-btn" data-cand-id="${cand.id}" data-title="${title}" data-house="${houseCode||''}">📸 Upload Image (Click)</button>
                            <button class="btn btn-sm btn-danger delete-cand" data-idx="${idx}" data-title="${title}" data-house="${houseCode||''}">Remove</button>
                         </div>`;
            });
            html += `<div class="inline-form"><input type="text" placeholder="New candidate name" id="newName_${id}" style="width:180px;"><input type="text" placeholder="Symbol (e.g., ⭐)" id="newSym_${id}" style="width:80px;"><button class="btn btn-sm btn-success add-cand" data-title="${title}" data-house="${houseCode||''}">➕ Add</button></div></div>`;
            return html;
        }
        adminHtml += renderSection("School Captain", schoolCaptainCandidates);
        adminHtml += renderSection("Vice Captain", viceCaptainCandidates);
        for(let h of houses) adminHtml += renderSection(`House Captain (${h.name})`, houseCaptainsData[h.code], h.code);
        for(let i=0;i<childClubSingles.length;i++) adminHtml += renderSection(childClubSingles[i].title, childClubSingles[i].candidates);
        adminHtml += renderSection("Child Club Members (Multi-select)", childClubMembers);
        document.getElementById('dynamicAdminCandidates').innerHTML = adminHtml;

        // --- Click-to-Upload Image (File Picker) ---
        document.querySelectorAll('.upload-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const candId = btn.getAttribute('data-cand-id');
                const title = btn.getAttribute('data-title');
                const house = btn.getAttribute('data-house');
                // Create hidden file input
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.onchange = (event) => {
                    const file = event.target.files[0];
                    if(file && file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            const imgData = ev.target.result;
                            if(updateCandidateImage(candId, imgData)) {
                                rebuildVotes();
                                saveToLocalStorage();
                                renderAdminPanel();
                                renderVoterUI();
                            } else {
                                alert("Candidate not found");
                            }
                        };
                        reader.readAsDataURL(file);
                    } else {
                        alert("Please select an image file");
                    }
                };
                fileInput.click();
            });
        });

        // Also support drag-and-drop on the upload button area for smart board convenience
        document.querySelectorAll('.upload-btn').forEach(btn => {
            btn.addEventListener('dragover', (e) => { e.preventDefault(); btn.style.background = 'rgba(243,156,18,0.5)'; });
            btn.addEventListener('dragleave', () => { btn.style.background = ''; });
            btn.addEventListener('drop', (e) => {
                e.preventDefault();
                btn.style.background = '';
                const file = e.dataTransfer.files[0];
                if(file && file.type.startsWith('image/')) {
                    const candId = btn.getAttribute('data-cand-id');
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        if(updateCandidateImage(candId, ev.target.result)) {
                            rebuildVotes(); saveToLocalStorage(); renderAdminPanel(); renderVoterUI();
                        }
                    };
                    reader.readAsDataURL(file);
                } else alert("Drop an image file");
            });
        });

        // Delete candidate
        document.querySelectorAll('.delete-cand').forEach(btn => {
            btn.addEventListener('click', () => {
                const title = btn.getAttribute('data-title');
                const idx = parseInt(btn.getAttribute('data-idx'));
                const house = btn.getAttribute('data-house');
                if(confirm(`Delete candidate from "${title}"?`)) {
                    if(title === "School Captain") schoolCaptainCandidates.splice(idx,1);
                    else if(title === "Vice Captain") viceCaptainCandidates.splice(idx,1);
                    else if(title && title.startsWith("House Captain") && house) houseCaptainsData[house].splice(idx,1);
                    else if(childClubSingles.some(s=>s.title === title)) childClubSingles.find(s=>s.title===title).candidates.splice(idx,1);
                    else if(title === "Child Club Members (Multi-select)") childClubMembers.splice(idx,1);
                    rebuildVotes(); saveToLocalStorage(); renderAdminPanel(); renderVoterUI();
                }
            });
        });
        // Add candidate
        document.querySelectorAll('.add-cand').forEach(btn => {
            btn.addEventListener('click', () => {
                const title = btn.getAttribute('data-title');
                const house = btn.getAttribute('data-house');
                const id = title.replace(/[^a-z0-9]/gi,'');
                const nameVal = document.getElementById(`newName_${id}`)?.value.trim();
                const symVal = document.getElementById(`newSym_${id}`)?.value.trim() || '🗳️';
                if(!nameVal) return alert("Enter candidate name");
                const newCand = { id: genId(), name: nameVal, symbol: symVal, image: "" };
                if(title === "School Captain") schoolCaptainCandidates.push(newCand);
                else if(title === "Vice Captain") viceCaptainCandidates.push(newCand);
                else if(title && title.startsWith("House Captain") && house) houseCaptainsData[house].push(newCand);
                else if(childClubSingles.some(s=>s.title === title)) childClubSingles.find(s=>s.title===title).candidates.push(newCand);
                else if(title === "Child Club Members (Multi-select)") childClubMembers.push(newCand);
                rebuildVotes(); saveToLocalStorage(); renderAdminPanel(); renderVoterUI();
            });
        });

        // Results with Leading/Winner logic
        const isElectionFinished = (totalVoters > 0 && votersDone >= totalVoters);
        let resultsHtml = '';
        const stepNames = ["School Captain", "Vice Captain", "House Captain", ...childClubSingles.map(s=>s.title), "Child Club Members"];
        for(let i=0;i<votes.length;i++) {
            let candidatesList = [];
            if(i===0) candidatesList = schoolCaptainCandidates;
            else if(i===1) candidatesList = viceCaptainCandidates;
            else if(i===2) { for(let h of houses) candidatesList.push(...houseCaptainsData[h.code]); }
            else if(i>=3 && i<=6) candidatesList = childClubSingles[i-3].candidates;
            else if(i===7) candidatesList = childClubMembers;
            let data = candidatesList.map(c => ({ name: c.name, count: votes[i][c.id] || 0, img: c.image, symbol: c.symbol })).sort((a,b)=>b.count - a.count);
            let highest = data.length ? data[0].count : 0;
            let totalCast = votersDone;
            resultsHtml += `<div class="result-block"><h3>📌 ${stepNames[i]}</h3>`;
            for(let item of data) {
                let percent = totalCast > 0 ? (item.count/totalCast)*100 : 0;
                let isLeader = (item.count === highest && item.count > 0);
                let badgeHtml = '';
                if(isLeader) {
                    if(isElectionFinished) {
                        badgeHtml = `<span class="winner-badge">🏆 विजेता (Winner)</span>`;
                    } else {
                        badgeHtml = `<span class="leading-badge">🔥 अग्रस्थान (Leading)</span>`;
                    }
                }
                let imgShow = item.img ? `<img src="${item.img}" style="width:35px; height:35px; border-radius:50%; margin-right:8px;">` : `<span style="font-size:1.5rem; margin-right:8px;">${item.symbol}</span>`;
                resultsHtml += `<div class="candidate-result">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                        <div>${imgShow} ${item.name} ${badgeHtml}</div>
                        <div><strong>${item.count}</strong> मत (${percent.toFixed(1)}%)</div>
                    </div>
                    <div class="result-bar-container"><div class="result-bar-wrapper"><div class="result-bar ${isLeader ? 'bar-green' : 'bar-red'}" style="width:${percent}%;"></div></div></div>
                </div>`;
            }
            resultsHtml += `</div>`;
        }
        document.getElementById('adminResultsContainer').innerHTML = resultsHtml;
    }

    loadFromLocalStorage();
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const target = btn.getAttribute('data-tab');
            document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active-panel'));
            document.getElementById(target+'Panel').classList.add('active-panel');
            document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));
            btn.classList.add('active');
            if(target==='voter') renderVoterUI(); else renderAdminPanel();
        });
    });
    document.getElementById('startElectionBtn').addEventListener('click', startElection);
    document.getElementById('resetSystemBtn').addEventListener('click', fullReset);
    renderVoterUI();
    renderAdminPanel();
</script>
</body>
</html>
