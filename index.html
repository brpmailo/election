<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Brp Digital Election</title>
    <link rel="icon" type="image/png" href="Brp Digital Institute logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: radial-gradient(circle at 10% 30%, #0b2b44, #05141f); min-height: 100vh; padding: 30px 20px; color: white; }
        .container { max-width: 1400px; margin: 0 auto; }
        .school-header { background: linear-gradient(135deg, #1e4b6e, #0a2a3b); border-radius: 45px; padding: 28px 30px; text-align: center; margin-bottom: 35px; }
        .school-name { font-size: 2.3rem; font-weight: 800; background: linear-gradient(135deg, #fff, #ffd966); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .motto { margin-top: 12px; font-size: 1.2rem; opacity: 0.9; }
        .tabs { display: flex; justify-content: center; gap: 18px; margin-bottom: 35px; flex-wrap: wrap; }
        .tab-btn { background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); border: none; padding: 14px 34px; border-radius: 60px; font-weight: 700; color: white; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, #f39c12, #e67e22); box-shadow: 0 8px 20px rgba(243,156,18,0.4); }
        .panel { display: none; animation: fadeIn 0.3s ease; }
        .panel.active-panel { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0);} }
        .card { background: rgba(255,255,255,0.06); backdrop-filter: blur(18px); border-radius: 45px; padding: 35px; border: 1px solid rgba(255,255,255,0.12); }
        .step-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; border-left: 6px solid #f39c12; padding-left: 20px; }
        .candidates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 28px; margin: 30px 0; }
        .candidate-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 32px; text-align: center; padding: 22px 15px; cursor: pointer; transition: all 0.25s; }
        .candidate-card:hover { transform: translateY(-8px); background: rgba(255,255,255,0.12); }
        .candidate-card.selected { background: linear-gradient(145deg, #f39c12, #d35400); border-color: #ffd966; }
        .candidate-symbol { font-size: 3rem; margin-bottom: 8px; display: block; }
        .candidate-img { width: 85px; height: 85px; object-fit: cover; border-radius: 50%; margin: 0 auto 10px; border: 2px solid gold; background: white; }
        .candidate-name { font-size: 1rem; font-weight: 700; word-break: break-word; }
        .checkbox-card { background: rgba(255,255,255,0.05); border-radius: 28px; padding: 12px; display: flex; align-items: center; gap: 15px; cursor: pointer; margin-bottom: 12px; }
        .checkbox-card:hover { background: rgba(255,255,255,0.12); }
        .checkbox-card input { width: 22px; height: 22px; accent-color: #f39c12; }
        .btn { background: linear-gradient(135deg, #2c7da0, #1f5068); border: none; padding: 12px 28px; border-radius: 60px; font-weight: 700; color: white; cursor: pointer; transition: 0.2s; margin-right: 12px; margin-top: 15px; display: inline-block; }
        .btn-primary { background: linear-gradient(135deg, #f39c12, #e67e22); }
        .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); }
        .btn-success { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-secondary { background: rgba(255,255,255,0.2); }
        .btn-skip { background: rgba(100,100,120,0.9); border: 1px solid #ffaa33; color: #ffecb3; }
        .btn-sm { padding: 6px 16px; font-size: 0.8rem; margin-top: 6px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 28px; text-align: center; }
        .result-block { background: rgba(0,0,0,0.25); border-radius: 30px; padding: 20px; margin-bottom: 25px; cursor: pointer; transition: 0.2s; }
        .result-block:hover { background: rgba(243,156,18,0.2); transform: scale(1.01); }
        .result-title { font-size: 1.3rem; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .candidate-result { margin-bottom: 16px; }
        .result-bar-wrapper { flex: 1; height: 30px; background: rgba(0,0,0,0.4); border-radius: 30px; overflow: hidden; }
        .result-bar { height: 100%; border-radius: 30px; transition: width 0.4s ease; }
        .bar-green { background: linear-gradient(90deg, #2ecc71, #27ae60); }
        .bar-red { background: linear-gradient(90deg, #e74c3c, #c0392b); }
        .bar-blue { background: linear-gradient(90deg, #3498db, #2980b9); }
        .winner-badge { background: gold; color: #1e2a3a; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 800; margin-left: 12px; }
        .leading-badge { background: #3498db; color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 800; margin-left: 12px; }
        .equal-badge { background: #95a5a6; color: #2c3e50; padding: 4px 12px; border-radius: 30px; font-size: 0.7rem; font-weight: 800; margin-left: 12px; }
        .admin-candidate-row { background: rgba(255,255,255,0.08); border-radius: 28px; padding: 12px 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .upload-btn { background: rgba(243,156,18,0.2); border: 2px dashed #f39c12; border-radius: 30px; padding: 6px 16px; cursor: pointer; transition: 0.2s; font-size: 0.75rem; text-align: center; color: #ffd966; }
        .upload-btn:hover { background: rgba(243,156,18,0.5); }
        .preview-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; background: white; }
        .inline-form { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 12px; }
        .post-card { background: rgba(0,0,0,0.2); border-radius: 32px; padding: 18px; margin-bottom: 25px; border-left: 4px solid #f39c12; }
        input, select { padding: 10px 16px; border-radius: 40px; border: none; font-size: 0.9rem; background: #fff; color: #000; }
        .thanks-message { background: linear-gradient(135deg, #27ae60, #2ecc71); padding: 14px 20px; border-radius: 50px; margin-top: 20px; text-align: center; font-weight: 700; }
        .skip-message { background: rgba(255,193,7,0.2); border: 1px solid #ffc107; padding: 8px 15px; border-radius: 50px; font-size: 0.85rem; display: inline-block; margin-top: 12px; }
        hr { margin: 20px 0; border-color: rgba(255,255,255,0.1); }
        .flex-btns { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-top: 20px; }
        .admin-subtabs { display: flex; gap: 15px; margin-bottom: 28px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 12px; flex-wrap: wrap; }
        .admin-subtab { background: none; border: none; padding: 8px 20px; font-weight: 700; color: #ccc; cursor: pointer; border-radius: 40px; transition: 0.2s; }
        .admin-subtab.active { background: #f39c12; color: #1e2a3a; }
        .winners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; margin-top: 25px; }
        .winner-card { background: linear-gradient(145deg, #1e4b6e, #0e2a3b); border-radius: 48px; padding: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.3); transition: all 0.3s ease; border: 1px solid rgba(255,215,0,0.3); backdrop-filter: blur(5px); cursor: pointer; }
        .winner-card:hover { transform: translateY(-8px) scale(1.02); border-color: gold; }
        .winner-card h3 { font-size: 1.4rem; background: linear-gradient(135deg, #ffd966, #f39c12); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 12px; }
        .winner-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid gold; margin: 10px auto; background: white; }
        .winner-name { font-size: 1.3rem; font-weight: 800; margin: 10px 0 5px; color: #ffecb3; }
        .winner-symbol { font-size: 2rem; }
        .house-winner-item { background: rgba(0,0,0,0.3); border-radius: 32px; margin: 12px 0; padding: 10px; transition: 0.2s; cursor: pointer; }
        .house-winner-item:hover { background: rgba(243,156,18,0.3); transform: scale(1.02); }
        .member-winner-item { display: inline-block; background: rgba(0,0,0,0.4); border-radius: 40px; padding: 8px 18px; margin: 5px; cursor: pointer; transition: 0.2s; }
        .member-winner-item:hover { background: #f39c12; color: #1e2a3a; transform: scale(1.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #0f2c3b; border-radius: 60px; max-width: 500px; width: 90%; padding: 30px; text-align: center; border: 2px solid #ffd966; animation: bounceIn 0.3s; }
        .modal-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 5px solid gold; margin: 15px auto; background: white; }
        .congrats { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #ffd966, #f39c12); -webkit-background-clip: text; background-clip: text; color: transparent; }
        @keyframes bounceIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .close-modal { background: #e67e22; border: none; padding: 8px 25px; border-radius: 40px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }
        @media (max-width: 700px) { .candidates-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>





<div class="container">
    <div class="school-header">
        <div class="school-name">🏛️ LOVELY ANGELS ENGLISH BOARDING SCHOOL 🏛️</div>
        <div class="motto">⚡Students' Election-2083⚡</div>
    </div>



    <div class="tabs">
        <button class="tab-btn active" data-tab="voter">🗳️Voting Panel</button>
        <button class="tab-btn" data-tab="admin">📊Admin Panel</button>
    </div>



    <div id="voterPanel" class="panel active-panel">
        <div class="card">
            <div id="voterContentArea"></div>
            <div id="voterFeedback"></div>
            <div style="margin-top: 30px; text-align: center;">
                <button id="forceFinishElectionBtn" class="btn btn-success">🏆Finish Election & Show Winners (Early)</button>
            </div>
        </div>
    </div>



    <div id="adminPanel" class="panel">
        <div class="card">
            <div class="admin-subtabs">
                <button class="admin-subtab active" data-subtab="define">✏️Define Candidates</button>
                <button class="admin-subtab" data-subtab="results">📈Live Results</button>
                <button class="admin-subtab" data-subtab="winners">🏆Declared Winners</button>
            </div>


            <div id="defineCandidateSection" class="admin-subpanel active-subpanel">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number" id="totalVotersDisplay">0</div><div>Total Voters</div></div>
                    <div class="stat-card"><div class="stat-number" id="votersDoneDisplay">0</div><div>Complete Vote</div></div>
                    <div class="stat-card"><div class="stat-number" id="remainingDisplay">0</div><div>Remaining</div></div>
                </div>


                <div style="margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px;">
                    <input type="number" id="setVotersInput" placeholder="Total Voters" value="5">
                    <button id="startElectionBtn" class="btn btn-primary">🚀Start Election</button>
                    <button id="resetSystemBtn" class="btn btn-danger">🔄 Full Reset (Clear All Data)</button>
                </div>


                <div id="dynamicAdminCandidates"></div>
            </div>
            <div id="liveResultsSection" class="admin-subpanel" style="display:none;">
                <div class="info-note" style="background:#0a2a38; padding:12px; border-radius:32px; margin-bottom:20px;">
                    🔄 <strong>Live Results</strong> — Before election finishes: <span style="color:#3498db">LEAD</span> & <span style="color:#95a5a6">EQUAL</span>. After finish: <span style="color:gold">WINNER</span>. Click any block to congratulate.
                </div>
                <div id="adminResultsContainer"></div>
            </div>
            <div id="winnersSection" class="admin-subpanel" style="display:none;">
                <div id="winnersContainer"></div>
            </div>
        </div>
    </div>
</div>

<div id="congratsModal" class="modal">
    <div class="modal-content">
        <h2 class="congrats">🎉CONGRATULATIONS🎉</h2>
        <div id="modalWinnerName" style="font-size: 1.6rem; font-weight: bold; margin-top: 10px;"></div>
        <div id="modalPostTitle" style="font-size: 1.2rem; opacity: 0.9;"></div>
        <img id="modalWinnerImg" class="modal-img" src="" alt="Winner Photo">
        <p id="modalMessage" style="margin: 15px 0;">You are the winner! 🏆</p>
        <button class="close-modal">Close</button>
    </div>
</div>



<script>
    const houses = [
        { code: "red", name: "🔴 Red House", symbol: "🔴" },
        { code: "blue", name: "🔵 Blue House", symbol: "🔵" },
        { code: "green", name: "🟢 Green House", symbol: "🟢" },
        { code: "yellow", name: "🟡 Yellow House", symbol: "🟡" }
    ];
    function genId() { return Date.now() + '-' + Math.random().toString(36).substr(2, 10); }

    let schoolCaptainCandidates = [ { id: genId(), name: "AMARJIT GAHATRAJ", symbol: "🦁", image: "" }, { id: genId(), name: "LOVESON BK", symbol: "🦚", image: "" } ];
    let viceCaptainCandidates = [ { id: genId(), name: "Ramesh Ghimire", symbol: "⚡", image: "" }, { id: genId(), name: "Anita Basnet", symbol: "🍃", image: "" } ];
    let houseCaptainsData = {
        red:   [{ id: genId(), name: "Red Captain - Ram Thapa", symbol: "🦁", image: "" }, { id: genId(), name: "Red Captain - Sita Sharma", symbol: "🌺", image: "" }],
        blue:  [{ id: genId(), name: "Blue Captain - Hari Bista", symbol: "⚡", image: "" }, { id: genId(), name: "Blue Captain - Gita Karki", symbol: "🌸", image: "" }],
        green: [{ id: genId(), name: "Green Captain - Bishal Rai", symbol: "🌿", image: "" }, { id: genId(), name: "Green Captain - Rina Magar", symbol: "🍃", image: "" }],
        yellow: [{ id: genId(), name: "Yellow Captain - Krishna Pun", symbol: "☀️", image: "" }, { id: genId(), name: "Yellow Captain - Anju Basnet", symbol: "🌟", image: "" }]
    };
    let childClubSingles = [
        { title: "👑 Child Club President", candidates: [{ id: genId(), name: "Suman Adhikari", symbol: "👑", image: "" }, { id: genId(), name: "Rita K.C.", symbol: "🌸", image: "" }] },
        { title: "🎤 Child Club Vice President", candidates: [{ id: genId(), name: "Bikram Thapa", symbol: "🎤", image: "" }, { id: genId(), name: "Nisha Gurung", symbol: "🕊️", image: "" }] },
        { title: "📝 Child Club Secretary", candidates: [{ id: genId(), name: "Alina Shrestha", symbol: "📚", image: "" }, { id: genId(), name: "Prabin Rai", symbol: "⚙️", image: "" }] },
        { title: "💰 Child Club Treasurer", candidates: [{ id: genId(), name: "Sachin KC", symbol: "💰", image: "" }, { id: genId(), name: "Monika Tamang", symbol: "💵", image: "" }] }
    ];
    let childClubMembers = [
        { id: genId(), name: "Anish Lama", symbol: "🤝", image: "" }, { id: genId(), name: "Kamana Ghimire", symbol: "🐇", image: "" },
        { id: genId(), name: "Rabin Poudel", symbol: "🏅", image: "" }, { id: genId(), name: "Sneha KC", symbol: "📷", image: "" },
        { id: genId(), name: "Ujwal Magar", symbol: "🧠", image: "" }, { id: genId(), name: "Karuna Thapa", symbol: "🌿", image: "" },
        { id: genId(), name: "Saugat Bhatta", symbol: "🚗", image: "" }, { id: genId(), name: "Sahira Basnet", symbol: "🐘", image: "" },
        { id: genId(), name: "Manisha Rijal", symbol: "🪑", image: "" }
    ];
    let totalVoters = 0, votersDone = 0;
    let currentStep = 0, currentHouseSelection = null, currentStepCompleted = false, selectedCandidateId = null, selectedMultiIds = [];
    let votes = [];



    function rebuildVotes() {
        votes = [];
        let m0 = {}; schoolCaptainCandidates.forEach(c => m0[c.id] = 0); votes.push(m0);
        let m1 = {}; viceCaptainCandidates.forEach(c => m1[c.id] = 0); votes.push(m1);
        let m2 = {}; for(let h of houses) houseCaptainsData[h.code].forEach(c => m2[c.id] = 0); votes.push(m2);
        for(let i=0;i<childClubSingles.length;i++) { let m = {}; childClubSingles[i].candidates.forEach(c => m[c.id] = 0); votes.push(m); }
        let m7 = {}; childClubMembers.forEach(c => m7[c.id] = 0); votes.push(m7);
    }

 
    function saveToLocalStorage() {
        const data = {
            schoolCaptainCandidates, viceCaptainCandidates, houseCaptainsData, childClubSingles, childClubMembers,
            totalVoters, votersDone, currentStep, currentHouseSelection, currentStepCompleted,
            selectedCandidateId, selectedMultiIds, votes
        };
        localStorage.setItem('fullElectionFlexible', JSON.stringify(data));
    }

    function loadFromLocalStorage() {
        const raw = localStorage.getItem('fullElectionFlexible');
        if(raw) {
            try {
                const d = JSON.parse(raw);
                schoolCaptainCandidates = d.schoolCaptainCandidates;
                viceCaptainCandidates = d.viceCaptainCandidates;
                houseCaptainsData = d.houseCaptainsData;
                childClubSingles = d.childClubSingles;
                childClubMembers = d.childClubMembers;
                totalVoters = d.totalVoters;
                votersDone = d.votersDone;
                currentStep = d.currentStep;
                currentHouseSelection = d.currentHouseSelection;
                currentStepCompleted = d.currentStepCompleted;
                selectedCandidateId = d.selectedCandidateId;
                selectedMultiIds = d.selectedMultiIds || [];
                votes = d.votes;
                // Ensure votes structure matches current candidate lists (but never reset to zeros if valid)
                if(!votes || votes.length !== 8) {
                    rebuildVotes();
                } else {
                    // Ensure each vote map has entries for all current candidate IDs (just in case IDs changed)
                    // But do NOT zero out counts. We'll just add missing entries with 0.
                    for(let i=0; i<votes.length; i++) {
                        let currentCandidates = [];
                        if(i===0) currentCandidates = schoolCaptainCandidates;
                        else if(i===1) currentCandidates = viceCaptainCandidates;
                        else if(i===2) for(let h of houses) currentCandidates.push(...houseCaptainsData[h.code]);
                        else if(i>=3 && i<=6) currentCandidates = childClubSingles[i-3].candidates;
                        else if(i===7) currentCandidates = childClubMembers;
                        for(let c of currentCandidates) {
                            if(votes[i][c.id] === undefined) votes[i][c.id] = 0;
                        }
                    }
                }
                return;
            } catch(e) { console.warn(e); }
        }
        // First time or corrupted: fresh start
        rebuildVotes();
        saveToLocalStorage();
    }

    // Helper: election finished?
    function isElectionFinished() { return totalVoters > 0 && votersDone >= totalVoters; }

    // ---------- WINNER CALCULATION (per house + top 4 members) ----------
    function computeAllWinners() {
        const winners = {};
        const scVotes = votes[0]; const scWinner = [...schoolCaptainCandidates].sort((a,b)=>(scVotes[b.id]||0)-(scVotes[a.id]||0))[0]; winners["🏆 School Captain"] = scWinner;
        const vcVotes = votes[1]; const vcWinner = [...viceCaptainCandidates].sort((a,b)=>(vcVotes[b.id]||0)-(vcVotes[a.id]||0))[0]; winners["🏆 Vice Captain"] = vcWinner;
        const houseVotes = votes[2]; const perHouseWinners = {};
        for(let house of houses) { const candidates = houseCaptainsData[house.code]; const winner = [...candidates].sort((a,b)=>(houseVotes[b.id]||0)-(houseVotes[a.id]||0))[0]; perHouseWinners[house.name] = winner; }
        winners["🏠 House Captains (Per House)"] = perHouseWinners;
        for(let i=0;i<childClubSingles.length;i++) { const post = childClubSingles[i]; const postVotes = votes[3+i]; const winner = [...post.candidates].sort((a,b)=>(postVotes[b.id]||0)-(postVotes[a.id]||0))[0]; winners[post.title] = winner; }
        const membersVotes = votes[7]; const sortedMembers = [...childClubMembers].sort((a,b)=>(membersVotes[b.id]||0)-(membersVotes[a.id]||0)); winners["👥 Child Club Members"] = sortedMembers.slice(0,4);
        return winners;
    }

    // ---------- MODAL CONGRATS ----------
    function showCongrats(postTitle, winnerObj) {
        const modal = document.getElementById('congratsModal');
        document.getElementById('modalWinnerName').innerText = winnerObj.name;
        document.getElementById('modalPostTitle').innerText = postTitle;
        const img = document.getElementById('modalWinnerImg');
        if(winnerObj.image && winnerObj.image.startsWith('data')) img.src = winnerObj.image;
        else img.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f39c12'/%3E%3Ctext x='50' y='67' text-anchor='middle' fill='white' font-size='40'%3E🏆%3C/text%3E%3C/svg%3E";
        document.getElementById('modalMessage').innerHTML = `🎉 Congratulations! You are the winner of <strong>${postTitle}</strong> 🎉`;
        modal.style.display = 'flex';
        modal.querySelector('.close-modal').onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };
    }

    // ---------- LIVE RESULTS with LEAD/EQUAL and BLUE BAR for ties ----------
    function renderLiveResultsUI() {
        const finished = isElectionFinished();
        const totalCast = votersDone;
        let html = '';
        function renderPost(title, candidates, voteMap, isHouseGroup = false) {
            let sorted = candidates.map(c => ({ ...c, count: voteMap[c.id] || 0 })).sort((a,b)=>b.count - a.count);
            let highest = sorted.length ? sorted[0].count : 0;
            let ties = sorted.filter(c => c.count === highest && highest > 0).length > 1;
            let leaders = ties ? sorted.filter(c => c.count === highest) : [sorted[0]];
            let clickable = !isHouseGroup && !ties && leaders.length===1 && leaders[0];
            let winnerObj = leaders[0];
            let badgeText = "";
            let badgeClass = "";
            if(finished) { badgeText = "🏆 WINNER"; badgeClass = "winner-badge"; }
            else if(ties) { badgeText = "⚖️ EQUAL"; badgeClass = "equal-badge"; }
            else { badgeText = "🔥 LEAD"; badgeClass = "leading-badge"; }
            let dataAttr = (clickable && winnerObj) ? ` data-post="${title}" data-winner='${JSON.stringify(winnerObj)}'` : "";
            html += `<div class="result-block"${dataAttr}><div class="result-title">${title} ${(!finished && (!ties || leaders.length>0)) ? `<span class="${badgeClass}">${badgeText}</span>` : (finished ? `<span class="winner-badge">🏆 WINNER</span>` : "")}</div>`;
            for(let c of sorted) {
                let percent = totalCast > 0 ? (c.count/totalCast)*100 : 0;
                let isLeader = leaders.some(l => l.id === c.id);
                let barClass = "bar-red";
                if(isLeader) {
                    if(finished) barClass = "bar-green";
                    else if(ties) barClass = "bar-blue";
                    else barClass = "bar-green";
                }
                let badgeHtml = "";
                if(isLeader) {
                    if(finished) badgeHtml = `<span class="winner-badge">🏆 WINNER</span>`;
                    else if(ties) badgeHtml = `<span class="equal-badge">⚖️ EQUAL</span>`;
                    else badgeHtml = `<span class="leading-badge">🔥 LEAD</span>`;
                }
                let imgShow = c.image ? `<img src="${c.image}" style="width:30px;height:30px;border-radius:50%;margin-right:8px;">` : `<span style="font-size:1.5rem;margin-right:8px;">${c.symbol}</span>`;
                html += `<div class="candidate-result"><div>${imgShow} ${c.name} ${badgeHtml} <strong>${c.count}</strong> (${percent.toFixed(1)}%)</div><div class="result-bar-wrapper"><div class="result-bar ${barClass}" style="width:${percent}%"></div></div></div>`;
            }
            html += `<div class="skip-message">ℹ️ ${totalCast} voters participated (skipped voters didn't vote here).</div></div>`;
            return { clickable, winnerObj };
        }
        renderPost("🏆 School Captain", schoolCaptainCandidates, votes[0]);
        renderPost("🎽 Vice Captain", viceCaptainCandidates, votes[1]);
        // House Captains group
        html += `<div class="result-block"><div class="result-title">🏠 House Captains (Per House)</div>`;
        const houseVotesMap = votes[2];
        for(let house of houses) {
            const candidates = houseCaptainsData[house.code];
            let sorted = candidates.map(c => ({ ...c, count: houseVotesMap[c.id] || 0 })).sort((a,b)=>b.count - a.count);
            let highest = sorted.length ? sorted[0].count : 0;
            let ties = sorted.filter(c => c.count === highest && highest > 0).length > 1;
            html += `<div style="margin-top:15px;"><strong>${house.name}</strong></div>`;
            for(let c of sorted) {
                let percent = totalCast > 0 ? (c.count/totalCast)*100 : 0;
                let isLeader = (!ties && c.count === highest && highest>0) || (ties && c.count === highest);
                let barClass = "bar-red";
                let badgeHtml = "";
                if(isLeader) {
                    if(finished) { barClass = "bar-green"; badgeHtml = `<span class="winner-badge">🏆 WINNER</span>`; }
                    else if(ties) { barClass = "bar-blue"; badgeHtml = `<span class="equal-badge">⚖️ EQUAL</span>`; }
                    else { barClass = "bar-green"; badgeHtml = `<span class="leading-badge">🔥 LEAD</span>`; }
                }
                let imgShow = c.image ? `<img src="${c.image}" style="width:25px;border-radius:50%">` : c.symbol;
                html += `<div>${imgShow} ${c.name} ${badgeHtml} ${c.count} (${percent.toFixed(1)}%)</div><div class="result-bar-wrapper"><div class="result-bar ${barClass}" style="width:${percent}%"></div></div>`;
            }
        }
        html += `</div>`;
        // Child Club Singles
        for(let i=0;i<childClubSingles.length;i++) renderPost(childClubSingles[i].title, childClubSingles[i].candidates, votes[3+i]);
        // Child Club Members
        const membersVotes = votes[7];
        const sortedMembers = [...childClubMembers].sort((a,b)=>(membersVotes[b.id]||0)-(membersVotes[a.id]||0));
        html += `<div class="result-block"><div class="result-title">👥 Child Club Members (Top 4 Leaders)</div>`;
        for(let c of sortedMembers) {
            let count = membersVotes[c.id]||0;
            let percent = totalCast>0?(count/totalCast*100):0;
            let isTop4 = sortedMembers.slice(0,4).some(w=>w.id===c.id);
            let barClass = isTop4 ? (finished ? "bar-green" : "bar-green") : "bar-red";
            let badgeHtml = isTop4 ? (finished ? `<span class="winner-badge">🏆 TOP WINNER</span>` : `<span class="leading-badge">🔥 LEAD</span>`) : "";
            let imgShow = c.image ? `<img src="${c.image}" style="width:30px;border-radius:50%">` : c.symbol;
            html += `<div>${imgShow} ${c.name} ${badgeHtml} ${count} (${percent.toFixed(1)}%)</div><div class="result-bar-wrapper"><div class="result-bar ${barClass}" style="width:${percent}%"></div></div>`;
        }
        html += `</div>`;
        document.getElementById('adminResultsContainer').innerHTML = html;
        document.querySelectorAll('.result-block[data-winner]').forEach(block => {
            block.style.cursor = 'pointer';
            block.addEventListener('click', (e) => {
                const post = block.getAttribute('data-post');
                const winnerStr = block.getAttribute('data-winner');
                try { const w = JSON.parse(winnerStr); showCongrats(post, w); } catch(err) {}
            });
        });
    }

    // ---------- BEAUTIFUL WINNERS TAB ----------
    function renderWinnersPanel() {
        const winners = computeAllWinners();
        let html = `<h2 style="text-align:center;">🏆 OFFICIAL WINNERS 🏆</h2><div class="winners-grid">`;
        for(let [post, winner] of Object.entries(winners)) {
            if(post === "🏠 House Captains (Per House)") {
                html += `<div class="winner-card"><h3>${post}</h3>`;
                for(let [houseName, w] of Object.entries(winner)) {
                    const imgHtml = w.image ? `<img src="${w.image}" class="winner-img" style="width:70px;height:70px;">` : `<div class="winner-symbol">${w.symbol}</div>`;
                    html += `<div class="house-winner-item" data-post="${houseName}" data-winner='${JSON.stringify(w)}'><strong>${houseName}</strong><br>${imgHtml}<div class="winner-name">${w.name}</div></div>`;
                }
                html += `</div>`;
            } 
            else if(post === "👥 Child Club Members (Top 4)") {
                html += `<div class="winner-card"><h3>${post}</h3><div>`;
                winner.forEach(w => {
                    const imgHtml = w.image ? `<img src="${w.image}" style="width:55px;height:55px;border-radius:50%;margin:5px;">` : `<span class="winner-symbol">${w.symbol}</span>`;
                    html += `<div class="member-winner-item" data-post="${post}" data-winner='${JSON.stringify(w)}'>${imgHtml} ${w.name}</div>`;
                });
                html += `</div></div>`;
            }
            else {
                const imgHtml = winner.image ? `<img src="${winner.image}" class="winner-img">` : `<div class="winner-symbol">${winner.symbol}</div>`;
                html += `<div class="winner-card" data-post="${post}" data-winner='${JSON.stringify(winner)}'>${imgHtml}<h3>${post}</h3><div class="winner-name">${winner.name}</div></div>`;
            }
        }
        html += `</div>`;
        document.getElementById('winnersContainer').innerHTML = html;
        document.querySelectorAll('.winner-card[data-winner], .house-winner-item, .member-winner-item').forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                const post = el.getAttribute('data-post');
                const winnerStr = el.getAttribute('data-winner');
                try { const w = JSON.parse(winnerStr); showCongrats(post, w); } catch(err) {}
            });
        });
    }

    // ---------- VOTING LOGIC (unchanged, fully functional) ----------
    function getCurrentStepData() { if(currentStep === 0) return { type: 'single', title: "🏆 School Captain", candidates: schoolCaptainCandidates }; if(currentStep === 1) return { type: 'single', title: "🎽 Vice Captain", candidates: viceCaptainCandidates }; if(currentStep === 2) return { type: 'house', title: "🏠 House Captain (Choose house)" }; if(currentStep >=3 && currentStep <=6) return { type: 'single', title: childClubSingles[currentStep-3].title, candidates: childClubSingles[currentStep-3].candidates }; if(currentStep === 7) return { type: 'multi', title: "👥 Child Club Members (Select 4)", candidates: childClubMembers, exact: 4 }; return null; }
    function submitVote() { if(currentStepCompleted) return; const step = getCurrentStepData(); if(!step) return; if(step.type === 'single') { if(!selectedCandidateId) { alert("Select candidate or SKIP"); return; } votes[currentStep][selectedCandidateId] += 1; } else if(step.type === 'house') { if(!selectedCandidateId) { alert("Select candidate or SKIP"); return; } votes[2][selectedCandidateId] += 1; } else if(step.type === 'multi') { if(selectedMultiIds.length !== step.exact) { alert(`Select exactly ${step.exact} or SKIP`); return; } for(let cid of selectedMultiIds) votes[currentStep][cid] += 1; } currentStepCompleted = true; afterMutation(); renderVoterUI(); }
    function skipCurrentPost() { if(!currentStepCompleted) { currentStepCompleted = true; afterMutation(); renderVoterUI(); } }
    function nextStep() { if(!currentStepCompleted) { alert("Vote or skip first"); return; } if(currentStep + 1 < 8) { currentStep++; currentStepCompleted = false; selectedCandidateId = null; selectedMultiIds = []; if(currentStep === 2) currentHouseSelection = null; afterMutation(); renderVoterUI(); } else { votersDone++; if(votersDone <= totalVoters) { currentStep = 0; currentHouseSelection = null; currentStepCompleted = false; selectedCandidateId = null; selectedMultiIds = []; afterMutation(); renderVoterUI(); showFeedback(); } else { renderVoterUI(); } } renderAdminPanelAll(); }
    function showFeedback() { const fb = document.getElementById('voterFeedback'); if(votersDone < totalVoters) fb.innerHTML = `<div class="thanks-message">✅ Voter ${votersDone} finished. Next voter (${votersDone+1}) can start.</div>`; else fb.innerHTML = `<div class="thanks-message">🎉 Election Completed! All votes recorded.</div>`; setTimeout(()=>{if(fb.innerHTML.includes("voter")) fb.innerHTML='';},4000); }
    function renderVoterUI() { const container = document.getElementById('voterContentArea'); if(!container) return; if(totalVoters === 0) { container.innerHTML = `<div style="padding:40px;">Set total voters in Admin → Define Candidates.</div>`; return; } if(votersDone >= totalVoters) { container.innerHTML = `<div><h2>Election Completed</h2><p>View results in Admin → Live Results or Winners tab</p></div>`; return; } const step = getCurrentStepData(); if(!step) return; let html = `<div class="step-title">${step.title} (Voter ${votersDone+1}/${totalVoters})</div>`; if(step.type === 'single') { html += `<div class="candidates-grid">`; step.candidates.forEach(cand => { html += `<div class="candidate-card ${selectedCandidateId===cand.id?'selected':''}" data-cand-id="${cand.id}">${cand.image?`<img src="${cand.image}" class="candidate-img">`:`<div class="candidate-symbol">${cand.symbol}</div>`}<div class="candidate-name">${cand.name}</div></div>`; }); html+=`</div>`; } else if(step.type === 'house') { if(!currentHouseSelection) { html += `<div class="candidates-grid">`; houses.forEach(h=>{ html+=`<div class="candidate-card" data-house="${h.code}"><div class="candidate-symbol">${h.symbol}</div><div class="candidate-name">${h.name}</div></div>`; }); html+=`</div>`; } else { const cands = houseCaptainsData[currentHouseSelection]; html += `<div class="candidates-grid">`; cands.forEach(c=>{ html+=`<div class="candidate-card ${selectedCandidateId===c.id?'selected':''}" data-cand-id="${c.id}">${c.image?`<img src="${c.image}" class="candidate-img">`:`<div class="candidate-symbol">${c.symbol}</div>`}<div class="candidate-name">${c.name}</div></div>`; }); html+=`</div><button id="backHouseBtn" class="btn btn-secondary">⬅️ Back</button>`; } } else if(step.type === 'multi') { html += `<p>Select exactly ${step.exact}</p><div class="candidates-grid" style="grid-template-columns:1fr;">`; step.candidates.forEach(cand=>{ html+=`<label class="checkbox-card" data-cand-id="${cand.id}"><input type="checkbox" ${selectedMultiIds.includes(cand.id)?'checked':''}> ${cand.image?`<img src="${cand.image}" style="width:40px;border-radius:50%">`:`<span>${cand.symbol}</span>`} ${cand.name}</label>`; }); html+=`</div>`; } if(!currentStepCompleted) html += `<div class="flex-btns"><button id="submitVoteBtn" class="btn btn-primary">🗳️ Vote</button><button id="skipPostBtn" class="btn btn-skip">⏭️ Skip</button></div>`; else html += `<div class="skip-message">✔️ ${selectedCandidateId||selectedMultiIds.length?'Voted':'Skipped'}</div><button id="nextStepBtn" class="btn">➡️ Next</button>`; container.innerHTML = html; if(!currentStepCompleted) attachVoterEvents(step); else { const nextBtn = document.getElementById('nextStepBtn'); if(nextBtn) nextBtn.onclick = nextStep; } }
    function attachVoterEvents(step) { if(step.type === 'single') { document.querySelectorAll('.candidate-card').forEach(c=>c.addEventListener('click',(e)=>{ selectedCandidateId=c.getAttribute('data-cand-id'); renderVoterUI(); })); document.getElementById('submitVoteBtn')?.addEventListener('click',submitVote); document.getElementById('skipPostBtn')?.addEventListener('click',skipCurrentPost); } else if(step.type === 'house') { if(!currentHouseSelection) { document.querySelectorAll('.candidate-card').forEach(c=>c.addEventListener('click',()=>{ currentHouseSelection=c.getAttribute('data-house'); selectedCandidateId=null; renderVoterUI(); })); } else { document.querySelectorAll('.candidate-card').forEach(c=>c.addEventListener('click',()=>{ selectedCandidateId=c.getAttribute('data-cand-id'); renderVoterUI(); })); document.getElementById('backHouseBtn')?.addEventListener('click',()=>{ currentHouseSelection=null; renderVoterUI(); }); } document.getElementById('submitVoteBtn')?.addEventListener('click',submitVote); document.getElementById('skipPostBtn')?.addEventListener('click',skipCurrentPost); } else if(step.type === 'multi') { const updateMulti=()=>{ let newSel=[]; document.querySelectorAll('.checkbox-card input:checked').forEach(cb=>{ newSel.push(cb.closest('.checkbox-card').getAttribute('data-cand-id')); }); if(newSel.length <= step.exact) selectedMultiIds=newSel; else alert(`Max ${step.exact}`); renderVoterUI(); }; document.querySelectorAll('.checkbox-card').forEach(l=>{ l.addEventListener('click',(e)=>{ if(e.target.tagName!=='INPUT'){ let inp=l.querySelector('input'); inp.checked=!inp.checked; updateMulti();}}); l.querySelector('input')?.addEventListener('change',updateMulti); }); document.getElementById('submitVoteBtn')?.addEventListener('click',submitVote); document.getElementById('skipPostBtn')?.addEventListener('click',skipCurrentPost); } }
    
    // ---------- ADMIN UI ----------
    function renderAdminPanelAll() { renderDefineCandidatesUI(); renderLiveResultsUI(); renderWinnersPanel(); updateStats(); }
    function updateStats() { document.getElementById('totalVotersDisplay').innerText=totalVoters; document.getElementById('votersDoneDisplay').innerText=votersDone; document.getElementById('remainingDisplay').innerText=totalVoters-votersDone; }
    function afterMutation() { saveToLocalStorage(); renderAdminPanelAll(); renderVoterUI(); }
    function updateCandidateImage(candidateId, imageDataUrl) { let updated = false; const update = (arr) => { arr.forEach(c => { if(c.id === candidateId) { c.image = imageDataUrl; updated = true; } }); }; update(schoolCaptainCandidates); update(viceCaptainCandidates); for(let h of houses) update(houseCaptainsData[h.code]); for(let s of childClubSingles) update(s.candidates); update(childClubMembers); if(updated) afterMutation(); return updated; }
    function renderDefineCandidatesUI() { let html = `<h3>✏️ Manage Candidates (Photo/Name Edit)</h3>`; function renderSection(title, candidates, houseCode=null) { let id=title.replace(/[^a-z0-9]/gi,''); let sect=`<div class="post-card"><h4>${title}</h4>`; candidates.forEach((cand,idx)=>{ sect+=`<div class="admin-candidate-row">${cand.image?`<img src="${cand.image}" class="preview-img">`:`<div class="candidate-symbol">${cand.symbol}</div>`}<div><strong>${cand.name}</strong></div><button class="upload-btn" data-cand-id="${cand.id}" data-title="${title}" data-house="${houseCode||''}">📸 Upload</button><button class="btn btn-sm btn-danger delete-cand" data-idx="${idx}" data-title="${title}" data-house="${houseCode||''}">Remove</button></div>`; }); sect+=`<div class="inline-form"><input type="text" placeholder="New name" id="newName_${id}"><input type="text" placeholder="Symbol" id="newSym_${id}" style="width:80px;"><button class="btn btn-sm btn-success add-cand" data-title="${title}" data-house="${houseCode||''}">➕ Add</button></div></div>`; return sect; }
        html += renderSection("School Captain", schoolCaptainCandidates); html += renderSection("Vice Captain", viceCaptainCandidates);
        for(let h of houses) html += renderSection(`House Captain (${h.name})`, houseCaptainsData[h.code], h.code);
        for(let s of childClubSingles) html += renderSection(s.title, s.candidates);
        html += renderSection("Child Club Members (Multi-select)", childClubMembers);
        document.getElementById('dynamicAdminCandidates').innerHTML = html;
        attachAdminEvents();
    }
    function attachAdminEvents() { document.querySelectorAll('.upload-btn').forEach(btn=>{ btn.onclick=()=>{ const fid=btn.getAttribute('data-cand-id'); const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.onchange=e=>{ const file=e.target.files[0]; if(file){ const reader=new FileReader(); reader.onload=ev=>{ if(updateCandidateImage(fid, ev.target.result)) afterMutation(); }; reader.readAsDataURL(file); } }; inp.click(); }; }); document.querySelectorAll('.delete-cand').forEach(btn=>{ btn.onclick=()=>{ const title=btn.getAttribute('data-title'), idx=parseInt(btn.getAttribute('data-idx')), house=btn.getAttribute('data-house'); if(confirm("Delete?")){ if(title==="School Captain") schoolCaptainCandidates.splice(idx,1); else if(title==="Vice Captain") viceCaptainCandidates.splice(idx,1); else if(title?.startsWith("House Captain") && house) houseCaptainsData[house].splice(idx,1); else if(childClubSingles.some(s=>s.title===title)) childClubSingles.find(s=>s.title===title).candidates.splice(idx,1); else if(title==="Child Club Members (Multi-select)") childClubMembers.splice(idx,1); rebuildVotes(); afterMutation(); } }; }); document.querySelectorAll('.add-cand').forEach(btn=>{ btn.onclick=()=>{ const title=btn.getAttribute('data-title'), house=btn.getAttribute('data-house'); const id=title.replace(/[^a-z0-9]/gi,''); const nameVal=document.getElementById(`newName_${id}`)?.value.trim(); const symVal=document.getElementById(`newSym_${id}`)?.value.trim()||'⭐'; if(!nameVal) return alert("Enter name"); const newCand={id:genId(), name:nameVal, symbol:symVal, image:""}; if(title==="School Captain") schoolCaptainCandidates.push(newCand); else if(title==="Vice Captain") viceCaptainCandidates.push(newCand); else if(title?.startsWith("House Captain") && house) houseCaptainsData[house].push(newCand); else if(childClubSingles.some(s=>s.title===title)) childClubSingles.find(s=>s.title===title).candidates.push(newCand); else if(title==="Child Club Members (Multi-select)") childClubMembers.push(newCand); rebuildVotes(); afterMutation(); }; }); }
    function startElection() { let newTotal=parseInt(document.getElementById('setVotersInput').value); if(newTotal<1) return; if(votersDone>0 && !confirm("Reset voting progress? Current votes will be lost.")) return; totalVoters=newTotal; votersDone=0; currentStep=0; currentStepCompleted=false; selectedCandidateId=null; selectedMultiIds=[]; rebuildVotes(); afterMutation(); document.querySelector('.tab-btn[data-tab="voter"]').click(); }
    function fullReset() { if(confirm("⚠️ FULL RESET: All candidates, votes and voter data will be erased permanently. Continue?")){ totalVoters=0; votersDone=0; currentStep=0; currentHouseSelection=null; currentStepCompleted=false; selectedCandidateId=null; selectedMultiIds=[]; rebuildVotes(); afterMutation(); renderVoterUI(); } }
    function forceFinishElection() { if(totalVoters===0){ alert("No election running. Start election first."); return; } if(votersDone < totalVoters){ if(confirm(`Only ${votersDone} out of ${totalVoters} voters have voted. Declare winners now?`)){ votersDone = totalVoters; afterMutation(); renderVoterUI(); renderAdminPanelAll(); document.querySelector('.admin-subtab[data-subtab="winners"]').click(); alert("Election finished early! Winners declared."); } } else { document.querySelector('.admin-subtab[data-subtab="winners"]').click(); } }
    
    // ---------- INITIALIZE ----------
    loadFromLocalStorage();
    // Ensure votes are correctly structured and save again
    if(!votes || votes.length !== 8) rebuildVotes();
    saveToLocalStorage();
    
    // Event bindings
    document.getElementById('startElectionBtn').onclick = startElection;
    document.getElementById('resetSystemBtn').onclick = fullReset;
    document.getElementById('forceFinishElectionBtn').onclick = forceFinishElection;
    document.querySelectorAll('.admin-subtab').forEach(btn=>{ btn.onclick=()=>{ document.querySelectorAll('.admin-subtab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); const target=btn.getAttribute('data-subtab'); document.getElementById('defineCandidateSection').style.display=target==='define'?'block':'none'; document.getElementById('liveResultsSection').style.display=target==='results'?'block':'none'; document.getElementById('winnersSection').style.display=target==='winners'?'block':'none'; if(target==='results') renderLiveResultsUI(); else if(target==='winners') renderWinnersPanel(); else renderDefineCandidatesUI(); }; });
    document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const target=btn.getAttribute('data-tab'); document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active-panel')); document.getElementById(target+'Panel').classList.add('active-panel'); document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active')); btn.classList.add('active'); if(target==='voter') renderVoterUI(); else renderAdminPanelAll(); }); });
    renderVoterUI(); renderAdminPanelAll();
</script>
</body>
