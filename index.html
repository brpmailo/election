<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Brp Digital Election</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 10% 30%, #0b2b44, #05141f);
            min-height: 100vh;
            padding: 30px 20px;
            color: white;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* HEADER */
        .school-header {
            background: linear-gradient(135deg, #1e4b6e, #0a2a3b);
            border-radius: 45px;
            padding: 28px 30px;
            text-align: center;
            margin-bottom: 35px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .school-name {
            font-size: 2.3rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #fff, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .motto {
            margin-top: 12px;
            font-size: 1.60rem;
            opacity: 0.9;
        }

        /* TABS */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 18px;
            margin-bottom: 35px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: none;
            padding: 14px 34px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            box-shadow: 0 8px 20px rgba(243,156,18,0.4);
            transform: translateY(-2px);
        }

        /* PANELS */
        .panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .panel.active-panel {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(18px);
            border-radius: 45px;
            padding: 35px;
            border: 1px solid rgba(255,255,255,0.12);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }

        .step-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 30px;
            border-left: 6px solid #f39c12;
            padding-left: 20px;
        }

        /* CANDIDATE GRID */
        .candidates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 28px;
            margin: 30px 0;
        }

        .candidate-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 32px;
            text-align: center;
            padding: 25px 15px;
            cursor: pointer;
            transition: all 0.25s;
        }

        .candidate-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .candidate-card.selected {
            background: linear-gradient(145deg, #f39c12, #d35400);
            border-color: #ffd966;
        }

        .candidate-symbol {
            font-size: 4rem;
            margin-bottom: 15px;
            display: inline-block;
        }

        .candidate-name {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* MULTI-SELECT STYLES */
        .checkbox-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 32px;
            padding: 16px 12px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: 0.2s;
        }
        .checkbox-card:hover {
            background: rgba(255,255,255,0.12);
        }
        .checkbox-card input {
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #f39c12;
        }
        .checkbox-card .candidate-symbol {
            font-size: 2.5rem;
            margin-bottom: 0;
        }
        .checkbox-card .candidate-name {
            flex: 1;
        }

        /* BUTTONS */
        .btn {
            background: linear-gradient(135deg, #2c7da0, #1f5068);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-right: 15px;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.15);
        }

        .btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
        }

        /* FEEDBACK */
        .thanks-message {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            padding: 14px 20px;
            border-radius: 50px;
            margin-top: 25px;
            text-align: center;
            font-weight: 700;
        }

        /* ADMIN PANEL */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .stat-card {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 28px;
            text-align: center;
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 800;
        }

        .result-block {
            background: rgba(0,0,0,0.25);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .result-candidate {
            margin: 14px 0;
        }

        .result-bar {
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            overflow: hidden;
            margin-top: 6px;
        }

        .fill-bar {
            height: 100%;
            border-radius: 40px;
            transition: width 0.4s;
        }

        .fill-bar.green {
            background: linear-gradient(90deg, #2ecc71, #27ae60);
        }
        .fill-bar.red {
            background: linear-gradient(90deg, #e74c3c, #c0392b);
        }

        .winner-badge {
            background: gold;
            color: #1e2a3a;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-left: 12px;
        }

        input, select {
            padding: 12px 18px;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            margin-right: 15px;
            width: 180px;
        }

        @media (max-width: 700px) {
            .school-name { font-size: 1.5rem; }
            .card { padding: 20px; }
            .candidates-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>




<div class="container">
    <div class="school-header">
        <div class="school-name">🏛️LOVELY ANGELS ENGLISH BOARDING SCHOOL🏛️</div>
        <div class="motto">⚡School Election-2083⚡</div>
    </div>



    <div class="tabs">
        <button class="tab-btn active" data-tab="voter">🗳️ मतदान (Voting)</button>
        <button class="tab-btn" data-tab="admin">📊 एडमिन प्यानल</button>
    </div>

    <div id="voterPanel" class="panel active-panel">
        <div class="card">
            <div id="stepDisplayArea"></div>
            <div id="voterFeedback"></div>
        </div>
    </div>

    <div id="adminPanel" class="panel">
        <div class="card">
            <h2>📋 निर्वाचन नियन्त्रण (Admin Control)</h2>
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-number" id="totalVotersDisplay">0</div><div>कुल मतदाता</div></div>
                <div class="stat-card"><div class="stat-number" id="votersDoneDisplay">0</div><div>मतदान गरेको</div></div>
                <div class="stat-card"><div class="stat-number" id="remainingDisplay">0</div><div>बाँकी</div></div>
            </div>
            <div style="margin-bottom: 25px;">
                <input type="number" id="setVotersInput" placeholder="जम्मा मतदाता" value="3">
                <button id="startElectionBtn" class="btn btn-primary">🚀 निर्वाचन सुरु गर्नुहोस्</button>
                <button id="resetSystemBtn" class="btn btn-danger">🔄 रिसेट गर्नुहोस्</button>
            </div>
            <div id="adminResultsContainer"></div>
        </div>
    </div>
</div>







<script>
    // ======================= POSITIONS =======================
    // Step 0: School Captain
    const step0 = {
        title: "🏆 School Captain",
        candidates: [
            { name: "AMARJIT GAHATRAJ", symbol: "🦁" },
            { name: "LOVESON BK", symbol: "🦚" }
        ]
    };



    // Step 1: Vice Captain
    const step1 = {
        title: "🎽 Vice Captain",
        candidates: [
            { name: "Ramesh Ghimire", symbol: "⚡" },
            { name: "Anita Basnet", symbol: "🍃" }
        ]
    };
    
    // House data
    const houses = [
        { name: "🔴 Red House", code: "red", symbol: "🔴" },
        { name: "🔵 Blue House", code: "blue", symbol: "🔵" },
        { name: "🟢 Green House", code: "green", symbol: "🟢" },
        { name: "🟡 Yellow House", code: "yellow", symbol: "🟡" }
    ];
    const houseCandidates = {
        red: [
            { name: "Red House Captain - Ram Thapa", symbol: "🦁" },
            { name: "Red House Captain - Sita Sharma", symbol: "🌺" }
        ],
        blue: [
            { name: "Blue House Captain - Hari Bista", symbol: "⚡" },
            { name: "Blue House Captain - Gita Karki", symbol: "🌸" }
        ],
        green: [
            { name: "Green House Captain - Bishal Rai", symbol: "🌿" },
            { name: "Green House Captain - Rina Magar", symbol: "🍃" }
        ],
        yellow: [
            { name: "Yellow House Captain - Krishna Pun", symbol: "☀️" },
            { name: "Yellow House Captain - Anju Basnet", symbol: "🌟" }
        ]
    };
    
    // Child Club positions (single-select) – President, VP, Secretary, Treasurer
    const childClubSingle = [
        { title: "👑 Child Club President", candidates: [
            { name: "Suman Adhikari", symbol: "👑" }, { name: "Rita K.C.", symbol: "🌸" }
        ]},
        { title: "🎤 Child Club Vice President", candidates: [
            { name: "Bikram Thapa", symbol: "🎤" }, { name: "Nisha Gurung", symbol: "🕊️" }
        ]},
        { title: "📝 Child Club Secretary", candidates: [
            { name: "Alina Shrestha", symbol: "📚" }, { name: "Prabin Rai", symbol: "⚙️" }
        ]},
        { title: "💰 Child Club Treasurer", candidates: [
            { name: "Sachin KC", symbol: "💰" }, { name: "Monika Tamang", symbol: "💵" }
        ]}
    ];
    
    // Child Club Members – 8 candidates total, voter must pick exactly 4
    const childClubMembersCandidates = [
        { name: "Anish Lama", symbol: "🤝" },
        { name: "Priya Shahi", symbol: "🎨" },
        { name: "Rabin Poudel", symbol: "🏅" },
        { name: "Sneha KC", symbol: "📷" },
        { name: "Ujwal Magar", symbol: "🧠" },
        { name: "Karuna Thapa", symbol: "🌿" },
        { name: "Saugat Bhatta", symbol: "⚡" },
        { name: "Manisha Rijal", symbol: "📞" }
    ];
    const childClubMembersStep = {
        title: "👥 Child Club Members (Select exactly 4)",
        type: "multi",
        candidates: childClubMembersCandidates,
        exactSelections: 4
    };
    
    // Build steps array:
    // 0: School Captain, 1: Vice Captain, 2: House Captain (special), 
    // then 4 single child club positions, then 1 multi member step
    let allSteps = [
        step0, 
        step1, 
        null,   // house captain placeholder
        ...childClubSingle,
        childClubMembersStep
    ];
    const TOTAL_STEPS = allSteps.length;
    
    function isHouseCaptainStep(stepIdx) {
        return stepIdx === 2;
    }
    function isChildMembersStep(stepIdx) {
        return stepIdx === (2 + 1 + childClubSingle.length); // after house + 4 singles
    }
    
    // ------------- GLOBAL STATE -------------
    let totalVoters = 0;
    let votersDone = 0;
    let currentStep = 0;
    let currentStepVoted = false;
    let selectedCandidateForStep = null;     // for single-select
    let selectedMulti = [];                  // for multi-select (member step)
    let tempSelectedHouse = null;            // for house captain
    
    let masterVotes = [];   // each element: for single: {candName: count}, for multi: same
    
    function initMasterVotes() {
        masterVotes = [];
        for (let i = 0; i < TOTAL_STEPS; i++) {
            if (isHouseCaptainStep(i)) {
                let obj = {};
                for (let house of houses) {
                    houseCandidates[house.code].forEach(c => { obj[c.name] = 0; });
                }
                masterVotes.push(obj);
            }
            else if (isChildMembersStep(i)) {
                let obj = {};
                childClubMembersCandidates.forEach(c => { obj[c.name] = 0; });
                masterVotes.push(obj);
            }
            else {
                let step = allSteps[i];
                let obj = {};
                step.candidates.forEach(c => { obj[c.name] = 0; });
                masterVotes.push(obj);
            }
        }
    }
    
    // localStorage
    function saveElectionData() {
        const data = {
            totalVoters, votersDone, currentStep, currentStepVoted,
            selectedCandidateForStep, selectedMulti, tempSelectedHouse,
            masterVotes
        };
        localStorage.setItem('schoolElectionData', JSON.stringify(data));
    }
    
    function loadElectionData() {
        const raw = localStorage.getItem('schoolElectionData');
        if (raw) {
            try {
                const data = JSON.parse(raw);
                totalVoters = data.totalVoters;
                votersDone = data.votersDone;
                currentStep = data.currentStep;
                currentStepVoted = data.currentStepVoted;
                selectedCandidateForStep = data.selectedCandidateForStep;
                selectedMulti = data.selectedMulti || [];
                tempSelectedHouse = data.tempSelectedHouse;
                masterVotes = data.masterVotes;
                if (!masterVotes || masterVotes.length !== TOTAL_STEPS) initMasterVotes();
                return;
            } catch(e) {}
        }
        totalVoters = 0;
        votersDone = 0;
        currentStep = 0;
        currentStepVoted = false;
        selectedCandidateForStep = null;
        selectedMulti = [];
        tempSelectedHouse = null;
        initMasterVotes();
    }
    
    function fullReset() {
        if (confirm("⚠️ पूर्ण रिसेट गर्दा सबै मत मेटिन्छ। के गर्नुहुन्छ?")) {
            totalVoters = 0;
            votersDone = 0;
            currentStep = 0;
            currentStepVoted = false;
            selectedCandidateForStep = null;
            selectedMulti = [];
            tempSelectedHouse = null;
            initMasterVotes();
            saveElectionData();
            renderVotingUI();
            renderAdminPanel();
            document.querySelector('.tab-btn[data-tab="admin"]').click();
        }
    }
    
    function startElection() {
        let newTotal = parseInt(document.getElementById('setVotersInput').value);
        if (isNaN(newTotal) || newTotal < 1) {
            alert("कृपया १ भन्दा बढी मतदाता संख्या राख्नुहोस्।");
            return;
        }
        if (votersDone > 0) {
            alert("मतदान सुरु भइसकेको छ। पुन: सुरु गर्न 'रिसेट गर्नुहोस्' प्रयोग गर्नुहोस्।");
            return;
        }
        totalVoters = newTotal;
        votersDone = 0;
        currentStep = 0;
        currentStepVoted = false;
        selectedCandidateForStep = null;
        selectedMulti = [];
        tempSelectedHouse = null;
        initMasterVotes();
        saveElectionData();
        renderVotingUI();
        renderAdminPanel();
        document.querySelector('.tab-btn[data-tab="voter"]').click();
    }
    
    function goToNextStep() {
        currentStep++;
        currentStepVoted = false;
        selectedCandidateForStep = null;
        selectedMulti = [];
        tempSelectedHouse = null;
        if (currentStep >= TOTAL_STEPS) {
            votersDone++;
            currentStep = 0;
            currentStepVoted = false;
            selectedCandidateForStep = null;
            selectedMulti = [];
            tempSelectedHouse = null;
            saveElectionData();
            renderVotingUI();
            renderAdminPanel();
            if (votersDone < totalVoters) {
                const fbDiv = document.getElementById('voterFeedback');
                fbDiv.innerHTML = `<div class="thanks-message">👋 मतदाता ${votersDone} समाप्त। अब मतदाता ${votersDone+1} को पालो। कृपया नयाँ चुनाव गर्नुहोस्।</div>`;
                setTimeout(() => {
                    if (fbDiv.innerHTML.includes("मतदाता")) fbDiv.innerHTML = '';
                }, 3000);
            } else {
                document.getElementById('voterFeedback').innerHTML = `<div class="thanks-message">🎉 निर्वाचन समाप्त! सबै मतदाताले मतदान गरे। 🎉</div>`;
            }
        } else {
            saveElectionData();
            renderVotingUI();
            document.getElementById('voterFeedback').innerHTML = '';
        }
        renderAdminPanel();
    }
    
    // ---------- RENDERING ----------
    function renderVotingUI() {
        const stepContainer = document.getElementById('stepDisplayArea');
        const feedbackDiv = document.getElementById('voterFeedback');
        if (!stepContainer) return;
        
        if (totalVoters === 0) {
            stepContainer.innerHTML = `<div style="text-align:center; padding:40px;">⏳ कृपया एडमिन प्यानलमा गई मतदाता संख्या तोक्नुहोस्।</div>`;
            feedbackDiv.innerHTML = '';
            return;
        }
        if (votersDone >= totalVoters) {
            stepContainer.innerHTML = `<div style="text-align:center;"><h2>🎉 निर्वाचन सम्पन्न भयो 🎉</h2><p>सबै मतदाताले मतदान गरिसकेका छन्। नतिजा हेर्न एडमिन प्यानलमा जानुहोस्।</p></div>`;
            feedbackDiv.innerHTML = '';
            return;
        }
        if (currentStep >= TOTAL_STEPS) {
            votersDone++;
            currentStep = 0;
            saveElectionData();
            renderVotingUI();
            renderAdminPanel();
            return;
        }
        
        if (isHouseCaptainStep(currentStep)) {
            renderHouseCaptainStep(stepContainer, feedbackDiv);
            return;
        }
        if (isChildMembersStep(currentStep)) {
            renderChildMembersStep(stepContainer, feedbackDiv);
            return;
        }
        // normal single-select step
        const step = allSteps[currentStep];
        let html = `<div class="step-title">📌 ${step.title}</div>`;
        html += `<div class="candidates-grid">`;
        step.candidates.forEach(candidate => {
            const isSelected = (selectedCandidateForStep === candidate.name);
            html += `
                <div class="candidate-card ${isSelected ? 'selected' : ''}" data-candidate="${candidate.name.replace(/"/g, '&quot;')}">
                    <div class="candidate-symbol">${candidate.symbol}</div>
                    <div class="candidate-name">${candidate.name}</div>
                </div>
            `;
        });
        html += `</div>`;
        if (!currentStepVoted) {
            html += `<button id="submitVoteBtn" class="btn btn-primary">🗳️ मत दिनुहोस् (Submit Vote)</button>`;
        } else {
            html += `<div><em>✔️ तपाईंले यस पदमा मत दिइसक्नुभयो।</em></div>`;
            html += `<button id="nextStepBtn" class="btn">➡️ अर्को पदमा जानुहोस् (Next)</button>`;
        }
        stepContainer.innerHTML = html;
        
        if (!currentStepVoted) {
            const cards = document.querySelectorAll('.candidate-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    if (currentStepVoted) return;
                    const candName = card.getAttribute('data-candidate');
                    selectedCandidateForStep = candName;
                    document.querySelectorAll('.candidate-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                });
            });
            const submitBtn = document.getElementById('submitVoteBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', () => {
                    if (!selectedCandidateForStep) {
                        alert("कृपया पहिले उम्मेदवार छान्नुहोस्");
                        return;
                    }
                    masterVotes[currentStep][selectedCandidateForStep] += 1;
                    currentStepVoted = true;
                    saveElectionData();
                    feedbackDiv.innerHTML = `<div class="thanks-message">✅ धन्यवाद! तपाईंले "${selectedCandidateForStep}" लाई मत दिनुभयो। कृपया Next बटन थिच्नुहोस्।</div>`;
                    renderVotingUI();
                    renderAdminPanel();
                });
            }
        } else {
            const nextBtn = document.getElementById('nextStepBtn');
            if (nextBtn) nextBtn.addEventListener('click', () => goToNextStep());
        }
    }
    
    function renderHouseCaptainStep(stepContainer, feedbackDiv) {
        if (tempSelectedHouse === null) {
            let html = `<div class="step-title">🏠 पहिले आफ्नो घर छान्नुहोस् (Choose your house first)</div>`;
            html += `<div class="candidates-grid">`;
            houses.forEach(house => {
                html += `
                    <div class="candidate-card" data-house="${house.code}">
                        <div class="candidate-symbol">${house.symbol}</div>
                        <div class="candidate-name">${house.name}</div>
                    </div>
                `;
            });
            html += `</div>`;
            stepContainer.innerHTML = html;
            const cards = document.querySelectorAll('.candidate-card');
            cards.forEach(card => {
                card.addEventListener('click', () => {
                    tempSelectedHouse = card.getAttribute('data-house');
                    renderVotingUI();
                });
            });
            feedbackDiv.innerHTML = '';
        } else {
            const candidatesList = houseCandidates[tempSelectedHouse];
            let html = `<div class="step-title">🏠 ${houses.find(h=>h.code===tempSelectedHouse).name} का लागि House Captain छान्नुहोस्</div>`;
            html += `<div class="candidates-grid">`;
            candidatesList.forEach(candidate => {
                const isSelected = (selectedCandidateForStep === candidate.name);
                html += `
                    <div class="candidate-card ${isSelected ? 'selected' : ''}" data-candidate="${candidate.name.replace(/"/g, '&quot;')}">
                        <div class="candidate-symbol">${candidate.symbol}</div>
                        <div class="candidate-name">${candidate.name}</div>
                    </div>
                `;
            });
            html += `</div>`;
            if (!currentStepVoted) {
                html += `<button id="submitVoteBtn" class="btn btn-primary">🗳️ मत दिनुहोस्</button>`;
                html += `<button id="backHouseBtn" class="btn btn-secondary">⬅️ पछाडि (Back to house)</button>`;
            } else {
                html += `<div><em>✔️ तपाईंले यस घरको लागि मत दिइसक्नुभयो।</em></div>`;
                html += `<button id="nextStepBtn" class="btn">➡️ अर्को पदमा जानुहोस् (Next)</button>`;
            }
            stepContainer.innerHTML = html;
            
            if (!currentStepVoted) {
                const cards = document.querySelectorAll('.candidate-card');
                cards.forEach(card => {
                    card.addEventListener('click', () => {
                        if (currentStepVoted) return;
                        const candName = card.getAttribute('data-candidate');
                        selectedCandidateForStep = candName;
                        document.querySelectorAll('.candidate-card').forEach(c => c.classList.remove('selected'));
                        card.classList.add('selected');
                    });
                });
                const submitBtn = document.getElementById('submitVoteBtn');
                if (submitBtn) {
                    submitBtn.addEventListener('click', () => {
                        if (!selectedCandidateForStep) {
                            alert("कृपया उम्मेदवार छान्नुहोस्");
                            return;
                        }
                        masterVotes[2][selectedCandidateForStep] += 1;
                        currentStepVoted = true;
                        saveElectionData();
                        feedbackDiv.innerHTML = `<div class="thanks-message">✅ धन्यवाद! तपाईंले "${selectedCandidateForStep}" लाई मत दिनुभयो। कृपया Next बटन थिच्नुहोस्।</div>`;
                        renderVotingUI();
                        renderAdminPanel();
                    });
                }
                const backBtn = document.getElementById('backHouseBtn');
                if (backBtn) {
                    backBtn.addEventListener('click', () => {
                        tempSelectedHouse = null;
                        selectedCandidateForStep = null;
                        renderVotingUI();
                    });
                }
            } else {
                const nextBtn = document.getElementById('nextStepBtn');
                if (nextBtn) nextBtn.addEventListener('click', () => goToNextStep());
            }
        }
    }
    
    function renderChildMembersStep(stepContainer, feedbackDiv) {
        const step = allSteps[currentStep];
        const maxSelect = step.exactSelections;
        let html = `<div class="step-title">📌 ${step.title} (तपाईंले ठीक ${maxSelect} जना छान्नुपर्छ)</div>`;
        html += `<div class="candidates-grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));">`;
        step.candidates.forEach(candidate => {
            const isChecked = selectedMulti.includes(candidate.name);
            html += `
                <label class="checkbox-card" data-name="${candidate.name.replace(/"/g, '&quot;')}">
                    <input type="checkbox" ${isChecked ? 'checked' : ''}>
                    <div class="candidate-symbol">${candidate.symbol}</div>
                    <div class="candidate-name">${candidate.name}</div>
                </label>
            `;
        });
        html += `</div>`;
        if (!currentStepVoted) {
            html += `<button id="submitMultiBtn" class="btn btn-primary" ${selectedMulti.length !== maxSelect ? 'disabled' : ''}>🗳️ यी ${selectedMulti.length} जनालाई मत दिनुहोस्</button>`;
        } else {
            html += `<div><em>✔️ तपाईंले ${selectedMulti.length} जना सदस्यहरूमा मत दिइसक्नुभयो।</em></div>`;
            html += `<button id="nextStepBtn" class="btn">➡️ अर्को पदमा जानुहोस् (Next)</button>`;
        }
        stepContainer.innerHTML = html;
        
        // attach change events
        const checkboxes = document.querySelectorAll('.checkbox-card input');
        const labels = document.querySelectorAll('.checkbox-card');
        const updateSelection = () => {
            let newSel = [];
            document.querySelectorAll('.checkbox-card input:checked').forEach(cb => {
                newSel.push(cb.value);
            });
            if (newSel.length > maxSelect) {
                alert(`तपाईंले धेरै छान्नुभयो। कृपया ठीक ${maxSelect} जना मात्र छान्नुहोस्।`);
                return false;
            }
            selectedMulti = newSel;
            saveElectionData();
            renderChildMembersStep(stepContainer, feedbackDiv);
            return true;
        };
        if (!currentStepVoted) {
            labels.forEach(label => {
                const chk = label.querySelector('input');
                const candidateName = label.getAttribute('data-name');
                chk.value = candidateName;
                const handleClick = (e) => {
                    if (e.target.tagName !== 'INPUT') {
                        chk.checked = !chk.checked;
                        if (updateSelection()) {
                            // re-render will recreate buttons
                        } else {
                            chk.checked = !chk.checked;
                        }
                    }
                };
                label.addEventListener('click', handleClick);
                chk.addEventListener('change', (e) => {
                    e.stopPropagation();
                    if (updateSelection()) {
                        // good
                    } else {
                        chk.checked = !chk.checked;
                    }
                });
            });
            const submitBtn = document.getElementById('submitMultiBtn');
            if (submitBtn) {
                submitBtn.addEventListener('click', () => {
                    if (selectedMulti.length !== maxSelect) {
                        alert(`कृपया ठीक ${maxSelect} जना उम्मेदवार छान्नुहोस्। (हाल: ${selectedMulti.length})`);
                        return;
                    }
                    for (let cand of selectedMulti) {
                        masterVotes[currentStep][cand] += 1;
                    }
                    currentStepVoted = true;
                    saveElectionData();
                    feedbackDiv.innerHTML = `<div class="thanks-message">✅ धन्यवाद! तपाईंले ${selectedMulti.length} जना सदस्यहरूमा मत दिनुभयो। कृपया Next बटन थिच्नुहोस्।</div>`;
                    renderVotingUI();
                    renderAdminPanel();
                });
            }
        } else {
            const nextBtn = document.getElementById('nextStepBtn');
            if (nextBtn) nextBtn.addEventListener('click', () => goToNextStep());
        }
    }
    
    // ---------- ADMIN PANEL WITH GREEN/RED BARS ----------
    function renderAdminPanel() {
        document.getElementById('totalVotersDisplay').innerText = totalVoters;
        document.getElementById('votersDoneDisplay').innerText = votersDone;
        document.getElementById('remainingDisplay').innerText = totalVoters - votersDone;
        
        const resultsContainer = document.getElementById('adminResultsContainer');
        if (!resultsContainer) return;
        let html = '';
        
        // Helper to make result block with winner green, others red
        function makeResultBlock(title, votesMap, totalCast) {
            const sorted = Object.entries(votesMap).sort((a,b) => b[1] - a[1]);
            const highestVote = sorted[0][1];
            let block = `<div class="result-block"><h3>${title}</h3>`;
            for (let [cand, count] of sorted) {
                let percent = (totalCast > 0) ? ((count / totalCast) * 100).toFixed(1) : 0;
                let isWinner = (count === highestVote && count > 0);
                let winnerMark = isWinner ? `<span class="winner-badge">🏆 विजेता</span>` : '';
                let barClass = isWinner ? 'green' : 'red';
                block += `
                    <div class="result-candidate">
                        <div style="display:flex; justify-content:space-between;">
                            <span>${cand} ${winnerMark}</span>
                            <span>${count} मत (${percent}%)</span>
                        </div>
                        <div class="result-bar"><div class="fill-bar ${barClass}" style="width:${percent}%;"></div></div>
                    </div>
                `;
            }
            block += `</div>`;
            return block;
        }
        
        // Step 0: School Captain
        html += makeResultBlock(step0.title, masterVotes[0], votersDone);
        // Step 1: Vice Captain
        html += makeResultBlock(step1.title, masterVotes[1], votersDone);
        // Step 2: House Captain
        html += makeResultBlock("🏠 House Captain", masterVotes[2], votersDone);
        // Child Club single positions
        for (let i = 0; i < childClubSingle.length; i++) {
            const stepIdx = 3 + i;
            html += makeResultBlock(childClubSingle[i].title, masterVotes[stepIdx], votersDone);
        }
        // Child Club Members (multi)
        const membersIdx = 3 + childClubSingle.length;
        html += makeResultBlock("👥 Child Club Members", masterVotes[membersIdx], votersDone);
        
        resultsContainer.innerHTML = html;
    }
    
    // TAB & BUTTONS
    function bindTabs() {
        const tabs = document.querySelectorAll('.tab-btn');
        tabs.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.getAttribute('data-tab');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
                if (target === 'voter') {
                    document.getElementById('voterPanel').classList.add('active-panel');
                    renderVotingUI();
                } else {
                    document.getElementById('adminPanel').classList.add('active-panel');
                    renderAdminPanel();
                }
                tabs.forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    }
    
    function bindAdminButtons() {
        document.getElementById('startElectionBtn').addEventListener('click', startElection);
        document.getElementById('resetSystemBtn').addEventListener('click', fullReset);
    }
    
    loadElectionData();
    bindTabs();
    bindAdminButtons();
    renderVotingUI();
    renderAdminPanel();
</script>
</body>
</html>
